{% load static %}
<header class="topbar">
  <style>
    /* ==================== TOPBAR ==================== */
    .topbar {
      background-color: #267ca7;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      color: white;
      z-index: 1000;
      box-shadow: 0 4px 15px rgba(91, 115, 232, 0.3);
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
    }
    
    .topbar-left {
      display: flex;
      align-items: center;
      gap: 15px;
      width: var(--sidebar-width);
      transition: var(--transition);
      flex-shrink: 0;
    }
    
    .logo-link {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      margin-left: 20px;
    }
    
    .logo-img {
      width: 100px;
      height: 100px;
      object-fit: contain;
      border-radius: 50%;
    }
    
    .logo-text {
      color: white;
      font-weight: bold;
      font-size: 17px;
      line-height: 1.2;
      letter-spacing: 0.5px;
    }
    
    /* ==================== LAYOUT PRINCIPAL ==================== */
    .main-container {
      display: flex;
      flex-grow: 1;
      overflow: hidden;
      margin-top: 70px;
      height: calc(100vh - 70px);
    }
    
    /* ==================== SIDEBAR ==================== */
    .sidebar {
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
      top: auto;
    }
    
    /* ==================== TOPBAR RIGHT ==================== */
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-grow: 1;
      justify-content: flex-end;
    }
    
    .top-icons {
      display: flex;
      align-items: center;
      gap: 20px;
      position: relative;
    }
    
    .top-icons .dropdown {
      position: relative;
    }
    
    /* ==================== AVATAR ==================== */
    .avatar-img {
      width: 38px !important;
      height: 38px !important;
      border-radius: 50% !important;
      object-fit: cover !important;
      display: block !important;
      flex-shrink: 0 !important;
    }
    
    .user-trigger {
      display: flex !important;
      align-items: center !important;
      gap: 8px !important;
      color: white !important;
      text-decoration: none !important;
      max-height: 70px !important;
      overflow: hidden !important;
      cursor: pointer;
    }
    
    .user-trigger::after {
      display: none;
    }
    
    /* ==================== DROPDOWN USUARIO ==================== */
    .top-icons .dropdown-menu.user-dropdown {
      position: absolute !important;
      top: calc(100% + 10px) !important;
      right: 0 !important;
      left: auto !important;
      transform: none !important;
      margin-top: 5px !important;
      min-width: 220px;
      z-index: 1050;
      border-radius: 10px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
      overflow: hidden;
    }
    
    .user-dropdown-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 15px;
      background: #f8f9fa;
    }
    
    .user-dropdown-avatar {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      object-fit: cover;
    }
    
    /* ==================== BODY ==================== */
    body {
      overflow: hidden;
    }
    
    /* ==================== MOBILE ==================== */
    @media (max-width: 768px) {
      .topbar-left {
        width: auto !important;
        flex: 1;
        gap: 10px;
      }
    
      .logo-link {
        margin-left: 5px !important;
        gap: 8px;
      }
    
      .logo-img {
        width: 40px !important;
        height: 40px !important;
      }
    
      .logo-text {
        font-size: 14px !important;
        line-height: 1.1;
      }
    
      .topbar-right {
        gap: 10px !important;
        flex-shrink: 0;
      }
    
      .search-container {
        display: none !important;
      }
    
      .sidebar {
        position: fixed !important;
        top: 70px !important;
        height: calc(100vh - 70px) !important;
        left: -100%;
        z-index: 999;
      }
    
      .sidebar.mobile-active {
        left: 0;
      }
    }
  </style>
  <!-- IZQUIERDA -->
  <div class="topbar-left">
    <i class="fas fa-bars menu-toggle" id="menuToggle"></i>

    <a href="{% url 'gimnasio:dashboard' %}" class="logo-link">
      <img src="{% static 'assets/img/avatars/logo.png' %}" class="logo-img" />
      <span class="logo-text">GYM<br />NAZARETH</span>
    </a>
  </div>

  <!-- DERECHA -->
  <div class="topbar-right">
    <!-- Backup -->
    <div class="btn-group">
      <button class="btn btn-primary dropdown-toggle" data-bs-toggle="dropdown"><i class="fa-solid fa-database"></i></button>
      <ul class="dropdown-menu dropdown-menu-end">
        <li>
          <a class="dropdown-item" href="{% url 'gimnasio:backup' %}"><i class="fa-solid fa-folder-open me-2"></i>Ir a Backup</a>
        </li>
        <li>
          <form action="{% url 'gimnasio:backup' %}" method="post">
            {% csrf_token %}
            <input type="hidden" name="accion" value="backup_completo" />
            <button type="submit" class="dropdown-item"><i class="fa-solid fa-download me-2"></i>Backup completo</button>
          </form>
        </li>
      </ul>
    </div>

    <!-- Buscador -->
    <div class="search-container d-none d-lg-flex">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" placeholder="Buscar" />
    </div>

    <!-- Usuario -->
    <div class="top-icons">
      <i class="fas fa-bell icon-btn"></i>

      <div class="dropdown">
        <a class="user-trigger dropdown-toggle" data-bs-toggle="dropdown">
          <span class="username-topbar d-none d-md-inline">{{ user.username }}</span>
          <img src="{% static 'assets/img/avatars/1.png' %}" class="avatar-img" />
        </a>

        <div class="dropdown-menu dropdown-menu-end user-dropdown">
          <div class="user-dropdown-header">
            <img src="{% static 'assets/img/avatars/1.png' %}" class="user-dropdown-avatar" />
            <div>
              <span class="small text-muted">Administrador</span>
              <h6 class="m-0">{{ user.username }}</h6>
            </div>
          </div>

          <div class="dropdown-divider"></div>

          <div class="px-3 py-2">
            <form method="post" action="{% url 'login:logout' %}">
              {% csrf_token %}
              <button type="submit" class="btn btn-primary w-100">Cerrar Sesión</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</header>
