{% extends 'home.html' %}
{% load static %}
{% block body %}
  <body class="{% if user.usuario.genero_usuario == 'F' %}theme-soft{% else %}theme-strong{% endif %} sidebar-active">
    {% include 'header.html' %}
    <div class="main-container" id="main-container">
        {% include "aside.html" %}
        <main class="content-area" id="content-area">{% block contenido %}{% endblock contenido %}</main>
    </div>

    <script>
      const menuToggle = document.getElementById('menuToggle');
      if(menuToggle) {
        menuToggle.addEventListener('click', () => {
          if (window.innerWidth > 1024) document.body.classList.toggle('sidebar-collapsed');
          else document.getElementById('sidebar').classList.toggle('mobile-active');
        });
      }
      
      document.querySelectorAll('.submenu-toggle').forEach(t => {
        t.addEventListener('click', function(e) {
          e.preventDefault();
          if (!document.body.classList.contains('sidebar-collapsed')) {
            const p = this.parentElement; p.classList.toggle('open');
            const i = this.querySelector('.arrow-icon');
            i.classList.toggle('fa-chevron-right', !p.classList.contains('open'));
            i.classList.toggle('fa-chevron-down', p.classList.contains('open'));
          }
        });
      });
    </script>

    <script src="{% static 'assets/vendor/libs/jquery/jquery.js' %}"></script>
    <script src="{% static 'assets/vendor/libs/popper/popper.js' %}"></script>
    <script src="{% static 'assets/vendor/js/bootstrap.js' %}"></script>
    <script src="{% static 'assets/vendor/libs/node-waves/node-waves.js' %}"></script>
    <script src="{% static 'assets/vendor/libs/perfect-scrollbar/perfect-scrollbar.js' %}"></script>
    <script src="{% static 'assets/vendor/js/menu.js' %}"></script>
    <script src="{% static 'assets/vendor/libs/apex-charts/apexcharts.js' %}"></script>
    <script src="{% static 'assets/js/main.js' %}"></script>
    <script src="{% static 'assets/js/dashboards-analytics.js' %}"></script>
    <script async defer src="https://buttons.github.io/buttons.js"></script>
    <script src="{% static 'lib/sweetalert2/sweetalert2.all.min.js' %}"></script>
    
    <style>
        /* ===== FIX: Eliminar espacio vacío debajo del footer ===== */
        html, body {
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }
        body {
            display: flex;
            flex-direction: column;
        }
        .main-container {
            flex: 1;
            display: flex;
            min-height: 0;
        }
        .content-area {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
        }
        /* ===== FIN FIX ===== */

        .search-container { max-width: 220px!important; width: 220px!important; position: relative; }
        #input-buscar { width: 100%!important; padding: 6px 12px!important; font-size: .85rem!important; background: rgba(255,255,255,.05)!important; border: 1px solid var(--border-color)!important; color: #fff!important; border-radius: var(--border-radius-btn)!important; }
        
        .resultados-dropdown { position: absolute; top: calc(100% + 6px); left: 0; right: 0; background: var(--bg-surface); border-radius: var(--border-radius-card); box-shadow: 0 10px 30px rgba(0,0,0,.6); z-index: 9999; overflow: hidden; min-width: 240px; border: 1px solid var(--border-color); }
        .resultado-item { display: flex; align-items: center; padding: 10px 16px; color: var(--text-muted); text-decoration: none; font-size: .88rem; transition: var(--transition); }
        .resultado-item:hover { background: var(--bg-surface-hover); color: var(--primary-blue); }

        /* ===== ACCESIBILIDAD - POSICIÓN CORREGIDA ===== */
        #accesibilidad-widget { 
            position: fixed; 
            bottom: 20px; 
            right: 20px; 
            z-index: 10000; 
            font-family: sans-serif; 
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
        }
        #btn-accesibilidad-toggle { 
            width: 50px; 
            height: 50px; 
            border-radius: 50%; 
            background: #1a4a4a; 
            border: 2px solid #ffd700; 
            color: #ffd700; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,.6); 
            transition: .3s ease;
            flex-shrink: 0;
        }
        #btn-accesibilidad-toggle:hover { 
            transform: scale(1.1);
            background: #2a5a5a;
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.3);
        }
        #btn-accesibilidad-toggle:active {
            transform: scale(0.95);
        }
        #btn-accesibilidad-toggle svg { 
            width: 26px; 
            height: 26px; 
            fill: currentColor; 
        }
        #accesibilidad-panel { 
            position: absolute; 
            bottom: 65px; 
            right: 0; 
            width: 240px; 
            background: #1a4a4a; 
            border-radius: 15px; 
            padding: 18px; 
            display: none; 
            flex-direction: column; 
            gap: 12px; 
            box-shadow: 0 12px 40px rgba(0,0,0,.7); 
            border: 2px solid rgba(255, 215, 0, 0.2); 
        }
        #accesibilidad-panel.activo { display: flex; }
        .accesibilidad-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .accesibilidad-btn { 
            background: #fff; 
            border: none; 
            border-radius: 12px; 
            padding: 10px 4px; 
            cursor: pointer; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 6px; 
            transition: .2s ease; 
            color: #1a3a5c; 
            font-size: 11px; 
            font-weight: 700; 
            text-align: center; 
            line-height: 1.1; 
            min-height: 70px; 
            justify-content: center;
        }
        .accesibilidad-btn:hover { 
            background: #e0f7fa; 
            transform: translateY(-3px);
            box-shadow: 0 4px 12px rgba(224, 247, 250, 0.4);
        }
        .accesibilidad-btn.activo { 
            background: #ffd700; 
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.4); 
        }
        .accesibilidad-btn svg, .accesibilidad-btn .icono-letra { 
            width: 22px; 
            height: 22px; 
            fill: #1a3a5c; 
            font-size: 16px; 
            font-weight: bold; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        #daltonismo-submenu { 
            display: none; 
            grid-template-columns: 1fr 1fr; 
            gap: 8px;
            padding-top: 8px;
            border-top: 1px solid rgba(255, 215, 0, 0.2);
        }
        #daltonismo-submenu.visible { display: grid; }
        .daltonismo-opcion { 
            border: 2px solid transparent; 
            border-radius: 10px; 
            padding: 8px 4px; 
            cursor: pointer; 
            font-size: 10px; 
            font-weight: 700; 
            color: #fff; 
            text-align: center; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 4px;
            transition: .2s ease;
        }
        .daltonismo-opcion:hover {
            transform: scale(1.05);
        }
        .daltonismo-opcion.activo { 
            border: 2px solid #fff;
            box-shadow: 0 0 10px currentColor;
        }
        .daltonismo-ninguno { background: #6c757d; } 
        .daltonismo-protanopia { background: #e74c3c; } 
        .daltonismo-deuteranopia { background: #27ae60; } 
        .daltonismo-tritanopia { background: #3498db; }
        .btn-restablecer { 
            background: #ff6b6b; 
            border: none; 
            border-radius: 12px; 
            padding: 12px; 
            cursor: pointer; 
            color: #fff; 
            font-size: 12px; 
            font-weight: 700; 
            width: 100%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 6px;
            transition: .2s ease;
        }
        .btn-restablecer:hover {
            background: #ff5252;
            transform: scale(1.02);
        }
        .btn-restablecer:active {
            transform: scale(0.98);
        }
        #indicador-accesibilidad { 
            position: fixed; 
            top: 20px; 
            right: 20px; 
            background: #1a4a4a; 
            color: #ffd700; 
            padding: 10px 16px; 
            border-radius: 8px; 
            font-size: 12px; 
            font-weight: 700; 
            display: none; 
            z-index: 10001; 
            box-shadow: 0 4px 12px rgba(0,0,0,.3);
            border: 1px solid #ffd700;
        }
        body.alto-contraste { 
            background: url("/static/imagen/imagen_login.jpg") !important; 
            background-size: cover !important;
            background-position: center !important;
            background-repeat: no-repeat !important;
            color: #ff0!important; 
            border-color: #ff0!important; 
            filter: contrast(1.2); 
        }
        body.alto-contraste * { 
            color: #ff0!important; 
            border-color: #ff0!important; 
        }
        body.alto-contraste #accesibilidad-widget #btn-accesibilidad-toggle {
            background: #006600!important;
            border: 3px solid #ffd700!important;
            color: #ffd700!important;
            box-shadow: 0 0 15px #ffd700!important;
        }
        body.alto-contraste #accesibilidad-widget #btn-accesibilidad-toggle:hover {
            background: #008800!important;
            box-shadow: 0 0 25px #ffd700!important;
        }
        @font-face { font-family: 'OpenDyslexic'; src: url('https://cdn.jsdelivr.net/npm/open-dyslexic@1.0.0/ttf/OpenDyslexic-Regular.ttf'); }
        body.modo-dislexia, body.modo-dislexia * { font-family: 'OpenDyslexic', sans-serif!important; }
        body.daltonismo-protanopia { filter: url('#protanopia')!important; }
        body.daltonismo-deuteranopia { filter: url('#deuteranopia')!important; }
        body.daltonismo-tritanopia { filter: url('#tritanopia')!important; }

        /* ===== FOOTER FIX: Nunca se pierde al hacer zoom ===== */
        .footer-neon {
            background: #050505;
            border-top: 1px solid rgba(255, 215, 0, 0.2);
            padding: 15px 0;
            width: 100%;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }
        .footer-text {
            color: #8b9eb0;
            font-size: 13px;
            margin: 0;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        .footer-link {
            color: #ffd700;
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s;
        }
        .footer-link:hover {
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }
        .footer-social i {
            font-size: 18px;
            color: #a0a0a0;
            margin-left: 15px;
            transition: 0.3s;
            cursor: pointer;
        }
        .footer-social i:hover {
            color: #ffd700;
            transform: scale(1.1);
        }
        .footer-neon .dropdown-menu {
            background-color: #111111;
            border: 1px solid #ffd700;
            border-radius: 10px;
            padding: 8px 0;
            min-width: 210px;
        }
        .footer-neon .dropdown-item {
            color: #ffd700;
            font-weight: 600;
            font-size: 13px;
            padding: 8px 16px;
            transition: all 0.3s ease;
        }
        .footer-neon .dropdown-item:hover,
        .footer-neon .dropdown-item:focus {
            background-color: #222222;
            color: #ffffff;
        }
        .footer-neon .dropdown-divider {
            border-color: rgba(255, 215, 0, 0.3);
        }
        @media (max-width:768px){

            .main-container{
                margin-top:70px;
                display:block;
                height:auto;
            }

            .content-area{
                width:100%;
                padding:15px;
                overflow-x:auto;
            }

        }
    </style>

    <script>
        const modulos = [
            { n: "Asistencia", u: "{% url 'gimnasio:listar_asistencia' %}", i: "fa-solid fa-calendar-check" },
            { n: "Membresía", u: "{% url 'gimnasio:listar_membresia' %}", i: "fa-solid fa-crown" },
            { n: "Notificaciones", u: "{% url 'gimnasio:listar_notificacion' %}", i: "fa-solid fa-bell" },
            { n: "Usuarios", u: "{% url 'gimnasio:listar_usuario' %}", i: "fa-solid fa-users" },
            { n: "Registro Visitantes", u: "{% url 'gimnasio:listar_registrovisitante' %}", i: "fa-solid fa-person-walking" },
            { n: "Nutrición", u: "{% url 'gimnasio:listar_nutriciones' %}", i: "fa-solid fa-utensils" },
            { n: "Rutinas", u: "{% url 'gimnasio:listar_rutinas' %}", i: "fa-solid fa-dumbbell" },
            { n: "Masa Corporal", u: "{% url 'gimnasio:listar_masa_corporal_clas' %}", i: "fa-solid fa-weight-scale" },
            { n: "Certificaciones", u: "{% url 'gimnasio:listar_certificacioninterna' %}", i: "fa-solid fa-award" },
            { n: "Elementos", u: "{% url 'gimnasio:listar_elementos' %}", i: "fa-solid fa-cogs" },
            { n: "Mantenimiento", u: "{% url 'gimnasio:listar_mantenimiento' %}", i: "fa-solid fa-wrench" },
            { n: "Reportes", u: "{% url 'gimnasio:listar_Reportes_estadisticas' %}", i: "fa-solid fa-chart-line" },
            { n: "Categorías", u: "{% url 'gimnasio:listar_categorias' %}", i: "fa-solid fa-tags" },
            { n: "Turnos Entrenadores", u: "{% url 'gimnasio:listar_turnodeentrenador' %}", i: "fa-solid fa-calendar-days" },
            { n: "Encuestas", u: "{% url 'gimnasio:listar_encuestas' %}", i: "fa-solid fa-poll" },
            { n: "Soporte PQRS", u: "{% url 'gimnasio:listar_Soporte_PQRS' %}", i: "fa-solid fa-headset" },
            { n: "Sanciones", u: "{% url 'gimnasio:listar_sanciones_clas' %}", i: "fa-solid fa-gavel" }
        ];
        const inp = document.getElementById("input-buscar"), res = document.getElementById("resultados-buscar");
        if (inp && res) {
            inp.addEventListener("input", function() {
                const q = this.value.trim().toLowerCase(); res.innerHTML = "";
                if (!q) return res.classList.add("d-none");
                const f = modulos.filter(m => m.n.toLowerCase().includes(q));
                if (!f.length) res.innerHTML = `<div class="resultado-item text-muted">Sin resultados</div>`;
                else f.forEach(m => res.innerHTML += `<a href="${m.u}" class="resultado-item"><i class="${m.i} me-2"></i>${m.n}</a>`);
                res.classList.remove("d-none");
            });
            document.addEventListener("click", e => { if(!inp.contains(e.target) && !res.contains(e.target)) res.classList.add("d-none"); });
        }
    </script>

    <svg style="display:none;"><defs>
        <filter id="protanopia"><feColorMatrix values="0.567 0.433 0 0 0  0.558 0.442 0 0 0  0 0.242 0.758 0 0  0 0 0 1 0"/></filter>
        <filter id="deuteranopia"><feColorMatrix values="0.625 0.375 0 0 0  0.7 0.3 0 0 0  0 0.3 0.7 0 0  0 0 0 1 0"/></filter>
        <filter id="tritanopia"><feColorMatrix values="0.95 0.05 0 0 0  0 0.433 0.567 0 0  0 0.475 0.525 0 0  0 0 0 1 0"/></filter>
    </defs></svg>

    <div id="indicador-accesibilidad"></div>
    <div id="accesibilidad-widget">
      <div id="accesibilidad-panel">
        <div class="accesibilidad-grid">
          <button class="accesibilidad-btn" id="btn-aumentar"><span class="icono-letra">A+</span><span>Aumentar</span></button>
          <button class="accesibilidad-btn" id="btn-disminuir"><span class="icono-letra">A-</span><span>Disminuir</span></button>
          <button class="accesibilidad-btn" id="btn-contraste"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg><span>Contraste</span></button>
          <button class="accesibilidad-btn" id="btn-dislexia"><svg viewBox="0 0 24 24"><path d="M12 3L1 9l4 2.18v6L12 21l7-3.82v-6l2-1.09V17h2V9L12 3z"/></svg><span>Dislexia</span></button>
          <button class="accesibilidad-btn" id="btn-lector"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg><span>Lector</span></button>
          <button class="accesibilidad-btn" id="btn-daltonismo"><svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5z"/></svg><span>Daltonismo</span></button>
        </div>
        <div id="daltonismo-submenu">
          <button class="daltonismo-opcion daltonismo-ninguno" data-tipo="ninguno">Normal</button>
          <button class="daltonismo-opcion daltonismo-protanopia" data-tipo="protanopia">Protan</button>
          <button class="daltonismo-opcion daltonismo-deuteranopia" data-tipo="deuteranopia">Deuter</button>
          <button class="daltonismo-opcion daltonismo-tritanopia" data-tipo="tritanopia">Tritan</button>
        </div>
        <button class="btn-restablecer" id="btn-restablecer">Restablecer</button>
      </div>
      <button id="btn-accesibilidad-toggle"><svg viewBox="0 0 24 24"><path d="M12 2c1.1 0 2 .9 2 2s-.9 2-2 2-2-.9-2-2 .9-2 2-2zm9 7h-6v13h-2v-6h-2v6H9V9H3V7h18v2z"/></svg></button>
    </div>

    <script>
    (function() {
      const $ = id => document.getElementById(id), b = document.body, s = localStorage;
      const t = $('btn-accesibilidad-toggle'), p = $('accesibilidad-panel'), ind = $('indicador-accesibilidad');
      let cfg = JSON.parse(s.getItem('acc_cfg') || '{"z":100,"l":false,"d":null,"c":false,"dx":false}');
      const save = () => s.setItem('acc_cfg', JSON.stringify(cfg));
      const msg = txt => { ind.innerText = txt; ind.style.display='block'; setTimeout(()=>ind.style.display='none', 2000); };
      
      const applyZoom = () => {
        // Aplicar zoom al body completo en lugar de solo al content-area
        b.style.fontSize = (cfg.z/100) + 'rem';
        // También mantenemos zoom en content-area para elementos específicos
        const contentArea = $('content-area');
        if (contentArea) contentArea.style.zoom = cfg.z/100;
      };
      
      const apply = () => {
        applyZoom();
        b.classList.toggle('alto-contraste', cfg.c); $('btn-contraste').classList.toggle('activo', cfg.c);
        b.classList.toggle('modo-dislexia', cfg.dx); $('btn-dislexia').classList.toggle('activo', cfg.dx);
        $('btn-lector').classList.toggle('activo', cfg.l);
        if(cfg.d) { b.classList.add('daltonismo-'+cfg.d); $('btn-daltonismo').classList.add('activo'); }
      };
      t.onclick = e => { e.stopPropagation(); p.classList.toggle('activo'); };
      document.onclick = e => { if(!$('accesibilidad-widget').contains(e.target)) p.classList.remove('activo'); };
      $('btn-aumentar').onclick = () => { if(cfg.z<200) { cfg.z+=10; applyZoom(); save(); msg(cfg.z+'%'); } };
      $('btn-disminuir').onclick = () => { if(cfg.z>70) { cfg.z-=10; applyZoom(); save(); msg(cfg.z+'%'); } };
      $('btn-contraste').onclick = () => { cfg.c=!cfg.c; apply(); save(); };
      $('btn-dislexia').onclick = () => { cfg.dx=!cfg.dx; apply(); save(); };
      
      const read = () => { if(!cfg.l) return; const txt = window.getSelection().toString(); if(txt) { speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(txt); u.lang='es-ES'; speechSynthesis.speak(u); } };
      $('btn-lector').onclick = () => { cfg.l=!cfg.l; apply(); save(); if(cfg.l) document.onmouseup=read; else document.onmouseup=null; };
      $('btn-daltonismo').onclick = () => $('daltonismo-submenu').classList.toggle('visible');
      document.querySelectorAll('.daltonismo-opcion').forEach(btn => {
        btn.onclick = () => {
          const type = btn.dataset.tipo;
          b.classList.remove('daltonismo-protanopia','daltonismo-deuteranopia','daltonismo-tritanopia');
          if(type!=='ninguno') { b.classList.add('daltonismo-'+type); cfg.d=type; } else cfg.d=null;
          apply(); save();
        };
      });
      $('btn-restablecer').onclick = () => { s.removeItem('acc_cfg'); location.reload(); };
      apply(); if(cfg.l) document.onmouseup=read;
    })();
    </script>

    <script>
document.addEventListener("DOMContentLoaded", function () {
    {% for message in messages %}
    Swal.fire({
        icon: "{% if message.tags == 'success' %}success{% elif message.tags == 'error' %}error{% elif message.tags == 'warning' %}warning{% else %}info{% endif %}",
        title: "{% if message.tags == 'success' %}Correcto{% elif message.tags == 'error' %}Error{% elif message.tags == 'warning' %}Advertencia{% else %}Información{% endif %}",
        text: "{{ message|escapejs }}",
        background: "rgba(10,10,10,0.95)",
        color: "#fff",
        confirmButtonColor: "#ffd700"
    });
    {% endfor %}
});
</script>
