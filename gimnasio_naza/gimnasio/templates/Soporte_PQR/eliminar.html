{% extends 'body.html' %}
{% block contenido %}
<div class="container mt-5" style="max-width: 600px;">
    <div class="card" style="background: rgba(10,10,10,0.95); border: 1px solid #ff4d4f; color: #fff; padding: 40px; text-align: center; border-radius: 15px;">
        <i class="fas fa-exclamation-triangle fa-4x mb-4" style="color: #ff4d4f;"></i>
        <h3 class="text-uppercase" style="color: #ffd700;">Confirmar Eliminación</h3>
        <p class="text-muted">¿Deseas eliminar el registro #{{ object.id }} | {{ object.descripcion }}?</p>
        <form method="post" action=".">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger mt-3">Sí, Aceptar</button>
            <a href="{{ listar_url }}" class="btn btn-secondary mt-3">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
